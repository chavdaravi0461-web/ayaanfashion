<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Ayaan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
      <div class="flex items-center gap-4">
        <a href="/admin/dashboard" class="text-lg font-bold tracking-tight">AYAAN</a>
        <span class="text-[10px] uppercase tracking-wider bg-black text-white px-2 py-0.5 rounded-full">Admin</span>
      </div>
      <div class="flex items-center gap-3 text-sm">
        <span id="adminTime" class="text-xs text-gray-400"></span>
        <button id="logoutBtn" class="text-xs text-red-400 hover:text-red-600 transition">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl border border-gray-100 p-4">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Total Orders</p>
        <p id="statOrders" class="text-2xl font-bold mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Revenue</p>
        <p id="statRevenue" class="text-2xl font-bold mt-1">$0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Products</p>
        <p id="statProducts" class="text-2xl font-bold mt-1">8</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-100 p-4">
        <p class="text-xs text-gray-400 uppercase tracking-wider">Customers</p>
        <p id="statCustomers" class="text-2xl font-bold mt-1">0</p>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="bg-white rounded-xl border border-gray-100">
      <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="text-sm font-semibold">Orders</h2>
      </div>
      <div id="ordersContainer" class="p-6">
        <div id="emptyOrders" class="text-center py-12 text-gray-400">
          <p class="text-sm">No orders yet</p>
        </div>
        <div id="ordersTable" class="hidden overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs text-gray-400 uppercase tracking-wider">
                <th class="pb-3 pr-4">Order</th>
                <th class="pb-3 pr-4">Customer</th>
                <th class="pb-3 pr-4">Items</th>
                <th class="pb-3 pr-4">Total</th>
                <th class="pb-3 pr-4">Date</th>
                <th class="pb-3">Status</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Auth check
    const session = JSON.parse(localStorage.getItem('ayaan_admin') || 'null');
    if (!session || session.expires < Date.now()) {
      localStorage.removeItem('ayaan_admin');
      window.location.replace('/admin');
    }

    // Update time
    function updateTime() {
      const el = document.getElementById('adminTime');
      if (el) el.textContent = new Date().toLocaleString();
    }
    updateTime();
    setInterval(updateTime, 1000);

    // Load orders
    const orders = JSON.parse(localStorage.getItem('ayaan_last_order') || '[]');
    const allOrders = Array.isArray(orders) ? orders : (orders.items ? [orders] : []);

    // Stats
    document.getElementById('statOrders').textContent = allOrders.length;
    const totalRev = allOrders.reduce((s, o) => s + (o.total || 0), 0);
    document.getElementById('statRevenue').textContent = `$${totalRev}`;

    const customers = new Set(allOrders.map(o => o.customer?.email).filter(Boolean));
    document.getElementById('statCustomers').textContent = customers.size;

    // Orders table
    if (allOrders.length > 0) {
      document.getElementById('emptyOrders').classList.add('hidden');
      document.getElementById('ordersTable').classList.remove('hidden');

      const body = document.getElementById('ordersBody');
      allOrders.reverse().forEach((order, idx) => {
        const tr = document.createElement('tr');
        tr.className = 'border-t border-gray-50';
        tr.innerHTML = `
          <td class="py-3 pr-4 font-medium">#${idx + 1}</td>
          <td class="py-3 pr-4">
            <div>${escapeHtml(order.customer?.firstName || '')} ${escapeHtml(order.customer?.lastName || '')}</div>
            <div class="text-xs text-gray-400">${escapeHtml(order.customer?.email || '')}</div>
          </td>
          <td class="py-3 pr-4">${order.items?.length || 0} item(s)</td>
          <td class="py-3 pr-4 font-medium">$${order.total || 0}</td>
          <td class="py-3 pr-4 text-xs text-gray-400">${new Date(order.date).toLocaleDateString()}</td>
          <td class="py-3"><span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full">Completed</span></td>
        `;
        body.appendChild(tr);
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('ayaan_admin');
      window.location.replace('/admin');
    });
  </script>
</body>
</html>
